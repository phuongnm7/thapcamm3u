name: M3U

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.10"

  - name: Install requests
    run: pip install requests

  - name: Run script
    run: python generate.py

  - name: List files
    run: ls
```
